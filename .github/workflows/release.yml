name: Release

# ──────────────────────────────────────────────
# トリガー: ユーザーが手動でタグを push したとき
#
#   git tag v1.0.0
#   git push origin v1.0.0
#
# 通常のリリースは bump-version.yml (手動実行) を使うこと。
# bump-version.yml は GITHUB_TOKEN でタグを push するため
# このワークフローはトリガーされない (GitHub Actions の仕様)。
# このワークフローはローカルから直接タグを push した場合のみ起動する。
# ──────────────────────────────────────────────
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"   # v0.2.0 → 0.2.0

          # ## [x.y.z] から次の ## [ までの行を抽出
          NOTES=$(awk \
            "/^## \[${VERSION_NUM}\]/{found=1; next} \
             found && /^## \[/{exit} \
             found{print}" \
            CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="リリースノートは [CHANGELOG.md](CHANGELOG.md) を参照してください。"
          fi

          # 複数行の出力を GITHUB_OUTPUT に渡す
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes "${{ steps.changelog.outputs.notes }}"
