# ============================================================
# Salesforce メタデータ日次変更追跡ワークフロー
# ============================================================
#
# このワークフローは毎朝 9:00 JST (= 00:00 UTC) に自動実行し、
# Salesforce org のメタデータスナップショットを取得して git にコミットする。
#
# 使い方:
#   1. このファイルを .github/workflows/daily-tracking.yml として配置する
#   2. GitHub Secrets に以下を登録する
#        SF_CLIENT_ID  : 外部クライアントアプリケーションのクライアントID
#        SF_JWT_KEY    : JWT署名用秘密鍵 (PEM形式の内容をそのまま登録)
#        SF_USERNAME   : 連携専用ユーザーのユーザー名
#   3. SFDX_ALIAS / SF_INSTANCE_URL を自 org の設定に変更する
#
# 認証方式について:
#   外部クライアントアプリケーション + JWT Bearer フローを使用する。
#   Salesforce 組織の設定により Connected App が利用できない場合、
#   外部クライアントアプリケーションが代替手段となる。
#
# IPアドレス制限について:
#   GitHub Actions の実行 IP は固定されないため、組織に IP 制限がある場合は
#   通常の認証ユーザーでは接続できない。
#   対処法: 連携専用プロファイルを作成し「IPアドレスの制限なし」を設定した上で
#   そのプロファイルを割り当てた連携専用ユーザーで実行する。
#
# 必要な権限:
#   - 実行ユーザーが Metadata API の読み取り権限を持つこと
#   - リポジトリに "Read and write permissions" が有効であること
#     (Settings → Actions → General → Workflow permissions)
# ============================================================

name: Daily Metadata Tracking

on:
  schedule:
    - cron: "0 0 * * *"   # 毎朝 9:00 JST (UTC+9)
  workflow_dispatch:        # 手動実行にも対応

env:
  SFDX_ALIAS: my-org                              # ← 自分の org エイリアスに変更する
  SF_INSTANCE_URL: https://test.salesforce.com    # ← Sandbox の場合はこのまま、本番は https://login.salesforce.com

jobs:
  track:
    name: Snapshot metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      # Salesforce CLI のインストール
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      # JWT認証: 秘密鍵をファイルに書き出してから認証し、直後に削除する
      - name: Authenticate to Salesforce (JWT)
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ env.SF_INSTANCE_URL }}" \
            --alias "${{ env.SFDX_ALIAS }}" \
            --set-default
          rm server.key

      # Python と sf-package-xml のインストール
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install sf-package-xml
        run: pip install git+https://github.com/jsugawara-keizu/salesforce-generate-package-xml.git

      # package.xml とサマリ JSON を生成
      - name: Generate package.xml
        run: |
          sf-package-xml \
            --target-org "${{ env.SFDX_ALIAS }}" \
            --output-dir manifest/ \
            --summary-json manifest/summary.json \
            --exclude-all-namespaces \
            --skip-folders

      # メタデータを取得
      # package.xml がメンバー上限超過で分割された場合 (package_01.xml, package_02.xml ...) にも対応する
      - name: Retrieve metadata
        run: |
          for manifest in manifest/package*.xml; do
            echo "Retrieving: ${manifest}"
            sf project retrieve start \
              --manifest "${manifest}" \
              --target-org "${{ env.SFDX_ALIAS }}" \
              --output-dir force-app/
          done

      # 変更があれば git コミット
      # stash → pull → stash pop で、Action 実行中の並行 Commit にも対応する
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest/ force-app/
          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            DATE=$(date +"%Y-%m-%d")
            git stash
            git pull --rebase
            git stash pop
            git add manifest/ force-app/
            git commit -m "chore: daily metadata snapshot ${DATE}"
            git push
          fi
